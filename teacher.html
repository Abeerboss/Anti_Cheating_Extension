<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Anti-Cheating Extension – Teacher</title>
  <link rel="stylesheet" href="shared.css">
  <link rel="stylesheet" href="teacher.css">
  <link rel="stylesheet" href="auth.css">
</head>
<body>

  <div class="header">
    <div class="logo"><span class="logo-hex">⬡</span><span class="logo-text">Anti-Cheating Extension</span></div>
    <div style="display:flex;align-items:center;gap:10px">
      <span id="teacher-name-tag" style="font-size:10px;color:#6e7681"></span>
      <button id="btn-teacher-logout" class="btn btn-ghost" style="padding:4px 10px;display:none">Logout</button>
    </div>
  </div>

  <div id="teacher-auth-wrap" class="auth-center">
    <div class="auth-box">

      <div class="screen-title" style="margin-bottom:20px;font-size:13px">Teacher Login</div>

      <div class="field"><label>Username</label><input id="t-user" type="text" placeholder="e.g. teacher01" autocomplete="off"></div>
      <div class="field"><label>Password</label><input id="t-pass" type="password" placeholder="••••••"></div>
      <div id="t-login-msg" class="msg-box"></div>
      <button id="btn-t-login" class="btn btn-accent btn-full">Login</button>

      <button id="btn-close" class="btn btn-ghost btn-full" style="margin-top:8px">← Close</button>

      <div style="margin-top:16px;text-align:center">
        <a href="#" id="lnk-admin-setup" style="font-size:9px;color:#3d444d;letter-spacing:1px;text-decoration:none">ADMIN SETUP ▾</a>
      </div>

      <div id="admin-setup-wrap" class="hidden" style="margin-top:12px;border-top:1px solid #21262d;padding-top:14px">
        <div class="screen-title" style="margin-bottom:12px;font-size:10px;color:#ff4757">Admin — Create Teacher Account</div>
        <div class="field"><label>Admin Code</label><input id="admin-code" type="password" placeholder="Enter admin code"></div>
        <div class="field"><label>Full Name</label><input id="admin-name" type="text" placeholder="e.g. Dr. Sara Ahmed" autocomplete="off"></div>
        <div class="field"><label>Username</label><input id="admin-user" type="text" placeholder="e.g. teacher01" autocomplete="off"></div>
        <div class="field"><label>Password</label><input id="admin-pass" type="password" placeholder="Min 6 characters"></div>
        <div class="field"><label>Confirm Password</label><input id="admin-pass2" type="password" placeholder="Repeat password"></div>
        <div id="admin-msg" class="msg-box"></div>
        <button id="btn-admin-register" class="btn btn-danger btn-full">Create Teacher Account</button>
      </div>

    </div>
  </div>

  <div id="teacher-dashboard" class="teacher-layout hidden">
    <div class="sidebar">
      <div class="sidebar-top">
        <div class="sidebar-label">Students</div>
        <div style="display:flex;gap:6px">
          <button id="btn-show-exam" class="btn btn-accent" style="flex:1;padding:7px">+ Exam</button>
          <button id="btn-show-add"  class="btn btn-blue"   style="flex:1;padding:7px">+ Student</button>
        </div>
      </div>
      <div class="sidebar-list" id="student-sidebar-list">
        <div class="empty-state" style="padding:20px">No students yet.</div>
      </div>
      <div class="sidebar-footer">
        <button class="btn btn-outline" style="width:100%;padding:6px" id="btn-export-all">⬇ Export All CSV</button>
      </div>
    </div>
    <div class="main-area">
      <div class="topbar">
        <div>
          <div class="topbar-title" id="view-title">All Students Overview</div>
          <span class="topbar-sub" id="view-sub">Click a student to view logs</span>
        </div>
        <button id="btn-export-student" class="btn btn-blue" style="display:none;padding:6px 12px">⬇ Export Student</button>
        <button id="btn-refresh" class="btn btn-ghost" style="padding:6px 12px">↻ Refresh</button>
      </div>
      <div class="content" id="main-content"></div>
    </div>
  </div>

  <script src="core/firebase.js"></script>
  <script src="core/storage.js"></script>
  <script src="shared/violations.js"></script>
  <script src="shared/ui.js"></script>
  <script src="shared/csv.js"></script>
  <script src="teacher/render.js"></script>
  <script src="teacher/students.js"></script>
  <script src="teacher/dashboard.js"></script>
  <script src="teacher/export.js"></script>
  <script src="teacher/auth_teacher.js"></script>
  <script src="teacher/init_teacher.js"></script>
</body>
</html>
